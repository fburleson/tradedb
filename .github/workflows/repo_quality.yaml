name: repo quality
on:
  push:
    branches:
      - dev
      - main
jobs:
  lock_file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install_uv
      - run: uv lock --locked

  type_consistency:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install_uv
      - run: uv run --all-extras pyright .

  tests:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install_uv
      - run: uv run --all-extras pytest -v
 
  build:
    runs-on: ubuntu-latest
    needs: [type_consistency, tests]
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install_uv
      - run: uv build